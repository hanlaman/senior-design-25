name: Deploy remind-api

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations"
        required: false
        type: boolean
        default: false

env:
  ACR_NAME: reminddevacr
  RESOURCE_GROUP: senior-design-dev6268b001

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push image to ACR
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/remind-api:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/remind-api:latest \
            ./remind-api
          docker push ${{ env.ACR_NAME }}.azurecr.io/remind-api:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/remind-api:latest

      - name: Update Container App image
        run: |
          az containerapp update \
            --name remind-api-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/remind-api:${{ github.sha }}

      - name: Run database migrations
        if: ${{ inputs.run_migrations }}
        working-directory: remind-api
        run: |
          npm ci
          npx ts-node src/db/migrate.ts
        env:
          MSSQL_HOST: remind-sql-dev.database.windows.net
          MSSQL_PORT: "1433"
          MSSQL_USER: remindadmin
          MSSQL_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          MSSQL_DATABASE: remind_db
          MSSQL_ENCRYPT: "true"
